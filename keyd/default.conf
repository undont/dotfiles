# keyd - Linux keyboard remapping daemon
# Equivalent of Karabiner Elements config for macOS
#
# Global remaps applied to all keyboards:
#   - Caps Lock -> Escape
#   - Right Alt  -> Left Control
#
# Apple keyboard overrides (vendor 05ac, product 0250):
#   - Swap grave/tilde with non-US backslash (UK layout fix)
#
# Reload: sudo keyd reload
# Test:   sudo keyd monitor

[ids]

*

[main]

capslock = escape
rightalt = leftcontrol

# Apple USB keyboard (vendor_id: 0x05ac / 1452, product_id: 0x0250 / 592)
[ids]

05ac:0250

[main]

capslock = escape
rightalt = leftcontrol
` = 102nd
102nd = `
