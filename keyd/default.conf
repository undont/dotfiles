# keyd - Linux keyboard remapping daemon
# Equivalent of Karabiner Elements config for macOS
#
# Applied to all keyboards:
#   - Caps Lock  -> Escape
#   - Right Alt  -> Control (held modifier)
#   - Grave/tilde <-> non-US backslash (102nd) UK/ISO layout swap
#
# A keyd config file may contain only ONE [ids] section. For per-device
# overrides, add a separate file under /etc/keyd/ (keyd applies the most
# specific match). We keep a single global block here.
#
# Reload: sudo keyd reload   (binary is keyd.rvaiya on Debian/Raspberry Pi OS)
# Test:   sudo keyd monitor

[ids]

*

[main]

capslock = escape
rightalt = layer(control)
` = 102nd
102nd = `
