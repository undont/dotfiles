# LazyGit base configuration
# Managed by dotfiles — symlinked from ~/dotfiles/lazygit/config.yml.
# Personal overrides go in local.yml (same directory) — set via LG_CONFIG_FILE.

gui:
  theme:
    # Use reverse video for selections — works with any terminal colour scheme
    # and avoids poor contrast from ANSI colours used as backgrounds
    selectedLineBgColor:
      - reverse
    selectedRangeBgColor:
      - reverse
