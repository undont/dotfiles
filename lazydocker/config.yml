# LazyDocker configuration
# Managed by dotfiles — changes here will be overwritten on update

gui:
  returnImmediately: true
  theme:
    # Use reverse video for selections — works with any terminal colour scheme
    # and avoids poor contrast from ANSI colours used as backgrounds
    selectedLineBgColor:
      - reverse
    selectedRangeBgColor:
      - reverse

commandTemplates:
  # Show timestamps in the main (m) log views
  serviceLogs: '{{ .DockerCompose }} logs --since=60m --follow --timestamps --no-log-prefix {{ .Service.Name }}'
  viewServiceLogs: '{{ .DockerCompose }} logs --follow --timestamps --no-log-prefix {{ .Service.Name }}'
  allLogs: '{{ .DockerCompose }} logs --tail=300 --follow --timestamps --no-log-prefix'
  viewAllLogs: '{{ .DockerCompose }} logs --timestamps --no-log-prefix'

logs:
  timestamps: false
  since: '60m'
