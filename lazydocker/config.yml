# LazyDocker configuration
# Managed by dotfiles — changes here will be overwritten on update

gui:
  returnImmediately: true
  theme:
    # Use reverse video for selections — works with any terminal colour scheme
    # and avoids poor contrast from ANSI colours used as backgrounds
    selectedLineBgColor:
      - reverse
    selectedRangeBgColor:
      - reverse

# Pretty-print docker's RFC3339Nano timestamps via format-logs.awk (sibling file).
# Path is hardcoded to the macOS lazydocker config dir — Linux users should
# change it to $HOME/.config/lazydocker/format-logs.awk.
#
# Coverage:
#   - allLogs (project "Logs" tab): shell-based → native pipe.
#   - viewServiceLogs / viewAllLogs (popped-out viewers): argv-only → sh -c wrap.
#   - Single-container Logs tab uses the Docker API directly and can't be
#     reformatted, so logs.timestamps is left off below.
commandTemplates:
  viewServiceLogs: 'sh -c ''{{ .DockerCompose }} logs --follow --timestamps --no-log-prefix {{ .Service.Name }} | awk -f "$HOME/Library/Application Support/lazydocker/format-logs.awk"'''
  allLogs: '{{ .DockerCompose }} logs --tail=300 --follow --timestamps --no-log-prefix | awk -f $HOME/Library/Application\ Support/lazydocker/format-logs.awk'
  viewAllLogs: 'sh -c ''{{ .DockerCompose }} logs --timestamps --no-log-prefix | awk -f "$HOME/Library/Application Support/lazydocker/format-logs.awk"'''

logs:
  timestamps: false
  since: '60m'
