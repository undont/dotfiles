# LazyDocker configuration
# Managed by dotfiles — changes here will be overwritten on update

gui:
  returnImmediately: true
  theme:
    # Use reverse video for selections — works with any terminal colour scheme
    # and avoids poor contrast from ANSI colours used as backgrounds
    selectedLineBgColor:
      - reverse
    selectedRangeBgColor:
      - reverse

# Pretty-print docker's RFC3339Nano timestamps via format-logs.awk (sibling file).
# format-logs.awk lives in a platform-specific dir (macOS: Library/Application
# Support/lazydocker, Linux: .config/lazydocker), so the path is resolved at
# runtime via `uname` rather than hardcoded to one platform.
#
# Coverage:
#   - allLogs (project "Logs" tab): shell-based → native pipe.
#   - viewServiceLogs / viewAllLogs (popped-out viewers): argv-only → sh -c wrap.
#   - Single-container Logs tab uses the Docker API directly and can't be
#     reformatted, so logs.timestamps is left off below.
commandTemplates:
  viewServiceLogs: 'sh -c ''{{ .DockerCompose }} logs --follow --timestamps --no-log-prefix {{ .Service.Name }} | awk -f "$( [ $(uname) = Darwin ] && printf %s "$HOME/Library/Application Support/lazydocker" || printf %s "$HOME/.config/lazydocker" )/format-logs.awk"'''
  allLogs: '{{ .DockerCompose }} logs --tail=300 --follow --timestamps --no-log-prefix | awk -f "$( [ $(uname) = Darwin ] && printf %s "$HOME/Library/Application Support/lazydocker" || printf %s "$HOME/.config/lazydocker" )/format-logs.awk"'
  viewAllLogs: 'sh -c ''{{ .DockerCompose }} logs --timestamps --no-log-prefix | awk -f "$( [ $(uname) = Darwin ] && printf %s "$HOME/Library/Application Support/lazydocker" || printf %s "$HOME/.config/lazydocker" )/format-logs.awk"'''

logs:
  timestamps: false
  since: "60m"
