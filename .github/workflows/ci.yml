name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # manual re-run, e.g. to re-roll the startup badge

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Run ShellCheck on installation scripts
        run: |
          # Exclude info-level warnings that are intentional:
          # SC1091: Can't follow external source files (expected in CI)
          # SC2001: Use ${//} instead of sed (sed needed for regex escaping)
          # SC2009: Consider using pgrep (ps|grep pattern is intentional for cross-platform)
          # SC2059: Printf format string variables (intentional for colours)
          # SC2015: A && B || C pattern (intentional, not if-then-else)
          # SC2016: Single quotes preventing expansion (intentional for fzf bindings)
          # SC2034: Unused variables (may be used by sourced scripts)
          # SC2329: Function never invoked (used indirectly in tests)
          EXCLUDES="-e SC1091 -e SC2001 -e SC2009 -e SC2059 -e SC2015 -e SC2016 -e SC2034 -e SC2329"
          shellcheck -x $EXCLUDES install.sh
          shellcheck -x $EXCLUDES scripts/install/*.sh
          shellcheck -x $EXCLUDES scripts/_lib/*.sh
          shellcheck -x $EXCLUDES scripts/hooks/*.sh
          # Theme tools (no .sh extension)
          shellcheck -x $EXCLUDES scripts/theme-switch scripts/theme-delete scripts/generate-theme

      - name: Run ShellCheck on tmux scripts
        run: |
          EXCLUDES="-e SC1091 -e SC2001 -e SC2009 -e SC2059 -e SC2015 -e SC2016 -e SC2034 -e SC2329"
          find tmux/scripts -path '*/tests/*' -prune -o -path '*/_lib/*' -prune -o -name '*.sh' -print \
            | xargs shellcheck -x $EXCLUDES
          shellcheck -x $EXCLUDES tmux/scripts/_lib/*.sh
          shellcheck -x $EXCLUDES -e SC2317 tmux/scripts/tests/*.sh

      - name: Run ShellCheck on session launchers
        run: |
          EXCLUDES="-e SC1091 -e SC2001 -e SC2009 -e SC2059 -e SC2015 -e SC2016 -e SC2034 -e SC2329"
          for f in launchers/*; do
            if file "$f" | grep -q "shell script"; then
              shellcheck -x $EXCLUDES "$f"
            fi
          done

      - name: Run ShellCheck on test scripts
        run: |
          EXCLUDES="-e SC1091 -e SC2001 -e SC2009 -e SC2059 -e SC2015 -e SC2016 -e SC2034 -e SC2329"
          if [[ -d scripts/tests ]]; then
            shellcheck -x $EXCLUDES -e SC2317 scripts/tests/*.sh
          fi

      - name: Run ShellCheck on CI scripts
        run: |
          EXCLUDES="-e SC1091 -e SC2001 -e SC2009 -e SC2059 -e SC2015 -e SC2016 -e SC2034 -e SC2317 -e SC2329"
          if [[ -d scripts/ci ]]; then
            shellcheck -x $EXCLUDES scripts/ci/*.sh
          fi

  test-all:
    name: All Tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install bash tmux

      - name: Run all tests with dynamic discovery
        run: |
          # Dynamic test discovery - automatically finds and runs all test files
          ./scripts/run-tests.sh

  syntax-check:
    name: Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check bash syntax
        run: |
          find . -name "*.sh" -type f | while read -r file; do
            bash -n "$file" || exit 1
          done

      - name: Check zsh syntax
        run: |
          sudo apt-get install -y zsh
          for f in zsh/*.zsh zsh/*.template scripts/hooks/*.zsh; do
            zsh -n "$f" || exit 1
          done

  lua-check:
    name: Lua Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Lua and luacheck
        run: |
          sudo apt-get install -y lua5.4 luarocks
          sudo luarocks install luacheck

      - name: Run luacheck on Neovim config
        run: luacheck nvim/lua/ --config nvim/.luacheckrc

      - name: Run luacheck on scripts Lua modules
        run: luacheck scripts/_lib/*.lua --config nvim/.luacheckrc

  startup-benchmark:
    name: Startup Benchmark
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      # Only benchmark when files sourced at zsh startup change. The job still
      # runs (and succeeds) on every push so auto-tag's `needs` stays satisfied,
      # but the expensive steps below are skipped — and the badge keeps its last
      # real measurement instead of flapping on an unrelated CI runner's noise.
      # A manual workflow_dispatch forces a re-measure regardless of changes,
      # so a bad cold-run number can be re-rolled without touching any file.
      - name: Detect zsh-affecting changes
        id: changes
        if: github.event_name != 'workflow_dispatch'
        uses: dorny/paths-filter@v4
        with:
          filters: |
            zsh:
              - 'zsh/**'
              - 'scripts/fzf-theme.sh'
              - 'scripts/hooks/cmd-alert-hook.zsh'
              - 'scripts/ci/benchmark-startup.sh'

      - name: Install benchmark dependencies
        if: steps.changes.outputs.zsh == 'true' || github.event_name == 'workflow_dispatch'
        run: brew install hyperfine fzf direnv fnm

      - name: Benchmark zsh startup
        id: benchmark
        if: steps.changes.outputs.zsh == 'true' || github.event_name == 'workflow_dispatch'
        run: ./scripts/ci/benchmark-startup.sh 125

      - name: Update startup badge
        if: >-
          github.ref == 'refs/heads/main' &&
          (
            (github.event_name == 'push' && steps.changes.outputs.zsh == 'true') ||
            github.event_name == 'workflow_dispatch'
          )
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: ${{ vars.BADGE_GIST_ID }}
          filename: zsh-startup.json
          label: zsh startup
          message: ${{ steps.benchmark.outputs.median_ms }}ms
          color: >-
            ${{
              steps.benchmark.outputs.median_ms < 75 && 'brightgreen' ||
              steps.benchmark.outputs.median_ms < 100 && 'green' ||
              steps.benchmark.outputs.median_ms < 125 && 'yellow' ||
              'red'
            }}

  release-guard:
    name: Release Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check CHANGELOG version was bumped
        run: ./scripts/ci/check-release-version.sh

  auto-tag:
    name: Auto Tag
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs:
      [
        shellcheck,
        test-all,
        syntax-check,
        lua-check,
        startup-benchmark,
        release-guard
      ]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create tag from CHANGELOG version
        run: |
          # Extract latest version from CHANGELOG.md (skip [Unreleased])
          VERSION=$(grep -E '^## \[[0-9]+\.[0-9]+\.[0-9]+\]' CHANGELOG.md | head -1 | sed -E 's/^## \[([0-9]+\.[0-9]+\.[0-9]+)\].*/\1/')

          if [[ -z "$VERSION" ]]; then
            echo "No version found in CHANGELOG.md"
            exit 0
          fi

          TAG="v${VERSION}"

          # Check if tag already exists
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
            exit 0
          fi

          echo "Creating tag $TAG"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
