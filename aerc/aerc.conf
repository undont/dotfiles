# vim: ft=dosini
# aerc base config, symlinked from dotfiles. no personal data here; accounts and
# secrets live in accounts.conf (local, keychain-backed). unset keys fall back to
# aerc's compiled defaults (html via the w3m filter, compose via $EDITOR=nvim).

[general]
styleset-name=dracula

[ui]
threading-enabled=true
sidebar-width=22

# -C makes aerc read only this file (no merge with the shipped default), so the
# filters must be declared here. names resolve from aerc's libexec filters dir;
# html goes through w3m.
# html uses `html` (not `! html`): without the bang aerc pipes the filter output
# into the pager, so the html filter auto-switches to w3m -dump and html mail
# scrolls in less exactly like plain text. with the bang it would run w3m
# interactively instead, giving a different (non-vim) key set.
[filters]
text/plain=colorize
text/calendar=calendar
message/delivery-status=colorize
message/rfc822=colorize
text/html=html
.headers=colorize

# -C drops aerc's default pager too. less gives uniform vim-style scrolling in
# the message body (C-d/C-u, j/k, g/G, /search). -R for the filters' ANSI colour.
[viewer]
pager=less -Rc
